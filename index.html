<!DOCTYPE html>
<html>
<head>
  <title>shri balaji stone</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #f5e6c8;
      color: #5a3e1b;
      text-align: center;
    }

    header {
      background: #d2b48c;
      padding: 20px;
      font-size: 28px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      margin-top: 30px;
    }

    .container {
      padding: 20px;
    }

    .product {
      background: #ead7b7;
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(90,62,27,0.3);
    }

    .product img {
      width: 160px;
      border-radius: 10px;
      border: 3px solid #c2a679;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #a67c52;
      color: white;
      border-radius: 5px;
    }

    /* 🔒 Hide main site before login */
    #mainSite {
      display: none;
    }
  </style>
</head>

<body>

<header>
  🏺 shri balaji stone
</header>

<!-- 🔐 LOGIN PAGE -->
<div id="loginPage">
  <h2>Login / Signup</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button class="btn" onclick="signup()">Sign Up</button>
  <button class="btn" onclick="login()">Login</button>
  <br><br>
  <button class="btn" onclick="skipLogin()">Skip Login</button>
</div>

<!-- 🏠 MAIN WEBSITE -->
<div id="mainSite">

  <div class="container">
    <h2>✨ Handcrafted Products</h2>

    <div class="product">
      <h3>Sandstone Murti</h3>
      <img src="Screenshot_2026_0325_105345.jpg">
      <p>Price: ₹1,50,000</p>
      <a class="btn" href="https://wa.me/919166354672?text=I want to buy Sandstone Murti">Buy</a>
    </div>

    <div class="product">
      <h3>Temple Decor Item</h3>
      <img src="21-feet-sandstone-temple-500x500.jpg">
      <p>Price: ₹3,00,000</p>
      <a class="btn" href="https://wa.me/919166354672?text=I want to buy Temple Decor Item">Buy</a>
    </div>
  </div>

  <div class="container">
    <h2>📞 Contact</h2>
    <p>WhatsApp: +919166354672</p>
  </div>

</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVA0qolBB18eg0QuS2ZH4K-iZ5FyeDY4s",
  authDomain: "shri-balaji-stonee.firebaseapp.com",
  projectId: "shri-balaji-stonee",
  storageBucket: "shri-balaji-stonee.firebasestorage.app",
  messagingSenderId: "930310986407",
  appId: "1:930310986407:web:8bb6d5b194d4dabea61982"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SIGNUP
window.signup = function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => alert("Signup Success ✅"))
    .catch(err => alert(err.message));
}

// LOGIN
window.login = function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Login Success ✅");
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("mainSite").style.display = "block";
    })
    .catch(err => alert(err.message));
}

// SKIP LOGIN
window.skipLogin = function () {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainSite").style.display = "block";
}
</script>

<footer>
  © 2026 shri balaji stone
</footer>

</body>
</html>
